spring.application.name=OMA
 
# ========================================
# DATABASE CONNECTION & CONNECTION POOL
# ========================================
# REQUIRED: Set these environment variables before running
# export DB_URL=jdbc:postgresql://localhost:5432/omav1
# export DB_USER=postgres
# export DB_PASS=your-password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
 
# ========================================
# HIKARI CONNECTION POOL OPTIMIZATION
# ========================================
# Increase connection pool size for 1000 concurrent users
# Each request may hold a connection during execution
spring.datasource.hikari.maximumPoolSize=${DB_POOL_SIZE}
spring.datasource.hikari.minimumIdle=${DB_POOL_MIN}
spring.datasource.hikari.connectionTimeout=${DB_CONN_TIMEOUT}
spring.datasource.hikari.idleTimeout=${DB_IDLE_TIMEOUT}
spring.datasource.hikari.maxLifetime=${DB_MAX_LIFETIME}
 
# ========================================
# JPA/HIBERNATE SETTINGS
# ========================================
# Let Flyway handle schema management, not Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
 
# ========================================
# CACHE CONFIGURATION
# ========================================
# Default to 'simple' for development (can be overridden to 'caffeine' for production)
spring.cache.type=${CACHE_TYPE}
 
# ========================================
# TOMCAT THREAD POOL OPTIMIZATION (for 1000 concurrent users)
# ========================================
# Max threads: For 1000 concurrent users, need at least 500+ threads
# Each thread processes one request, and can handle keep-alive connections
server.tomcat.threads.max=${TOMCAT_MAX_THREADS}
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS}
 
# Accept queue size: Requests waiting for a thread to be available
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT}
 
# Connection timeout and keep-alive settings
server.tomcat.connection-timeout=${TOMCAT_CONN_TIMEOUT}
server.tomcat.keep-alive-timeout=${TOMCAT_KEEP_ALIVE_TIMEOUT}
 
# Use NIO for better concurrency under high load
server.tomcat.protocol=${TOMCAT_PROTOCOL}
 
# Increase maximum connections
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS}
 
# ========================================
# HTTP RESPONSE COMPRESSION
# ========================================
# Compress responses to reduce network overhead
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json
 
# ========================================
# FLYWAY CONFIGURATION
# ========================================
# Automatically run migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=false
spring.flyway.validate-on-migrate=false
# Log migration details
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core=DEBUG
 
# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=${LOG_LEVEL_ROOT}
logging.level.com.example.OMA=${LOG_LEVEL_OMA}
logging.level.com.example.OMA.Service=${LOG_LEVEL_SERVICE}
logging.level.com.example.OMA.Controller=${LOG_LEVEL_CONTROLLER}
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
 
# ========================================
# reCAPTCHA v3 CONFIGURATION - PRODUCTION
# ========================================
# Real reCAPTCHA keys from Google Console
# Threshold 0.5: Real users (0.7-1.0) pass, bots (0.0-0.4) blocked
recaptcha.secret.key=${RECAPTCHA_SECRET_KEY}
recaptcha.score.threshold=${RECAPTCHA_SCORE_THRESHOLD}
# Monitoring: Log suspicious activity and verification failures
logging.level.com.example.OMA.Service.RecaptchaService=INFO
logging.level.com.example.OMA.Controller.SurveyController=INFO
 
# ========================================
# ALLOWED ORIGINS (CORS)
# ========================================
# REQUIRED: Set this environment variable
# export ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
# OR (production): export ALLOWED_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
app.cors.allowed-origins=${ALLOWED_ORIGINS}
 
# ========================================
# JWT CONFIGURATION
# ========================================
# REQUIRED: Set these environment variables (NO DEFAULT - production safety)
# export JWT_SECRET=your-256-bit-secret-key (DO NOT use default values in production!)
# export JWT_EXPIRATION=1800000 (milliseconds, default: 30 minutes)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:1800000}
 
# ========================================
# COOKIE SECURITY
# ========================================
# Set to true in production (HTTPS environments) so cookies are sent over HTTPS only.
# export COOKIE_SECURE=true
cookie.secure=${COOKIE_SECURE:false}
 
# ========================================
# DATA RETENTION (GDPR)
# ========================================
# Number of days to retain identifiable session data before automatic anonymization.
# A scheduled job runs daily at 02:00 UTC and anonymizes sessions older than this.
# Default: 730 days (24 months). Set via environment variable: export DATA_RETENTION_DAYS=730
data.retention.days=${DATA_RETENTION_DAYS:730}
